<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>BAD ARPG — Combat Sandbox V1</title>
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=Pixelify+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* Global pixel discipline — same rules as Phase 1 */
    html, body, * {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Pixelify Sans', system-ui, sans-serif;
      -webkit-font-smoothing: none;
      font-smooth: never;
      user-select: none;
      -webkit-user-select: none;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
    }
    canvas {
      display: block;
      /* Vite/Pixi sets canvas dims at 1920x1080; CSS scales to fit while
         preserving aspect ratio via transform. */
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
